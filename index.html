<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP YUPPENTEK 1 LEGOK</title>
    <link rel="website icon" type="png" 
    href="logosmp.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1e40af;
            --secondary-color: #f59e0b;
            --dark-color: #1f2937;
            --light-bg: #f3f4f6;
            --accent-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; /* prevent horizontal scroll on mobile */
        }

        /* ================= NAVBAR ================= */
        .navbar {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);

            /* Desktop: oval pill */
            width: 88%;
            max-width: 1100px;
            padding: 10px 24px;

            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.4);

            box-shadow:
                0 8px 25px rgba(0,0,0,0.15),
                0 2px 6px rgba(0,0,0,0.08);

            z-index: 9999;

            /* Ensure it doesn't overflow */
            box-sizing: border-box;
        }

        /* ================= CONTAINER ================= */
        .navbar .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap; /* keep brand + toggler on same line always */
            gap: 0;
            padding: 0;
            max-width: 100%;
        }

        /* ================= BRAND ================= */
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: clamp(0.78rem, 2.2vw, 1.2rem);
            white-space: nowrap;
            overflow: visible;
            /* text-overflow: ellipsis; */
          <div>
            <div class="rf-upload-label">KTP Orang Tua <span style="color:#dc2626;font-size:0.7rem;">*</span></div>
            <div class="rf-upload-sub">PDF — maks. 10 MB</div>
            <div class="rf-fname" id="rfn_ktp">Belum ada file dipilih</div>
          </div>
        </div>
        <input type="file" id="rf_file_ktp" accept=".pdf" style="display:none" onchange="tampilNamaFile(this,'rfn_ktp')">

        <div class="rf-upload" onclick="document.getElementById('rf_file_pip').click()">
          <div class="rf-upload-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
          </div>
          <div>
            <div class="rf-upload-label">Kartu PIP <span class="rf-opt">Opsional</span></div>
            <div class="rf-upload-sub">PDF — maks. 10 MB</div>
            <div class="rf-fname" id="rfn_pip">Belum ada file dipilih</div>
          </div>
        </div>
        <input type="file" id="rf_file_pip" accept=".pdf" style="display:none" onchange="tampilNamaFile(this,'rfn_pip')">

        <p style="font-size:0.72rem;color:#9ca3af;margin-top:10px;">* Wajib diisi. Data dan dokumen disimpan langsung ke Google Drive dan Spreadsheet sekolah.</p>
      </div>
    `,
    width: '600px',
    zIndex: 99999,
    showCancelButton: true,
    confirmButtonText: 'Kirim Pendaftaran',
    cancelButtonText: 'Batal',
    confirmButtonColor: '#1e40af',
    cancelButtonColor: '#6b7280',
    showLoaderOnConfirm: true,
    allowOutsideClick: false,
    preConfirm: async () => {
      const nama      = document.getElementById('rf_nama').value.trim();
      const jk        = document.getElementById('rf_jk').value;
      const tmptlahir = document.getElementById('rf_tmptlahir').value.trim();
      const tgllahir  = document.getElementById('rf_tgllahir').value;
      const asalsd    = document.getElementById('rf_asalsd').value.trim();
      const ortu      = document.getElementById('rf_ortu').value.trim();
      const wa        = document.getElementById('rf_wa').value.trim();
      const email     = document.getElementById('rf_email').value.trim();
      const alamat    = document.getElementById('rf_alamat').value.trim();

      const fileAkte = document.getElementById('rf_file_akte').files[0];
      const fileKK   = document.getElementById('rf_file_kk').files[0];
      const fileKTP  = document.getElementById('rf_file_ktp').files[0];
      const filePIP  = document.getElementById('rf_file_pip').files[0];

      if (!nama || !jk || !tmptlahir || !tgllahir || !asalsd || !ortu || !wa || !alamat) {
        Swal.showValidationMessage('Harap lengkapi semua field yang wajib diisi (*).');
        return false;
      }
      if (!fileAkte || !fileKK || !fileKTP) {
        Swal.showValidationMessage('Harap upload Akta Kelahiran, Kartu Keluarga, dan KTP Orang Tua.');
        return false;
      }

      const maxSize = 10 * 1024 * 1024;
      for (const f of [fileAkte, fileKK, fileKTP, filePIP].filter(Boolean)) {
        if (f.size > maxSize) {
          Swal.showValidationMessage(`File "${f.name}" melebihi batas 10 MB.`);
          return false;
        }
      }

      const toBase64 = (file) => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('Gagal membaca file'));
        r.readAsDataURL(file);
      });

      try {
        const payload = {
          nama, jk, tmptlahir, tgllahir, asalsd,
          ortu, wa, email, alamat,
          file_akte: await toBase64(fileAkte),
          file_kk:   await toBase64(fileKK),
          file_ktp:  await toBase64(fileKTP),
          file_pip:  filePIP ? await toBase64(filePIP) : null,
        };

        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        const result = await res.json();

        if (result.status !== 'ok') {
          Swal.showValidationMessage('Gagal menyimpan data: ' + (result.message || 'Coba lagi.'));
          return false;
        }
        return { nama };
      } catch (err) {
        Swal.showValidationMessage('Koneksi gagal. Periksa internet dan coba lagi.');
        return false;
      }
    }
  }).then((result) => {
    if (result.isConfirmed && result.value) {
      Swal.fire({
        icon: 'success',
        title: 'Pendaftaran Berhasil',
        html: `
          <p>Terima kasih, <strong>${result.value.nama}</strong>!</p>
          <p style="color:#6b7280;font-size:0.9rem;margin-top:8px;">
            Data dan dokumen kamu sudah tersimpan ke sistem sekolah.<br>
            Pihak sekolah akan menghubungi via WhatsApp dalam 1–2 hari kerja.
          </p>`,
        confirmButtonColor: '#1e40af',
        confirmButtonText: 'Oke, Terima Kasih'
      });
    }
  });
}
    </script>
</body>
</html>
